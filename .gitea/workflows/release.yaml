name: Upload Release Asset
on:
  push:
    tags:
      - 'v*'

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Mod Jar
        run: |
          # 1. Find the compiled jar
          JAR_PATH=$(ls build/libs/*.jar | grep -vE "sources|dev|api" | head -n 1)
          VERSION=${GITHUB_REF#refs/tags/}
          
          # 2. Get the Release ID from your Gitea API
          RELEASE_ID=$(curl -s "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/tags/$VERSION" \
            -H "Authorization: token ${{ secrets.WIKI_TOKEN }}" | jq '.id')
          
          # 3. Upload the asset directly
          curl -X 'POST' \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/$RELEASE_ID/assets" \
            -H "Authorization: token ${{ secrets.WIKI_TOKEN }}" \
            -H "Content-Type: application/java-archive" \
            -F "attachment=@$JAR_PATH"