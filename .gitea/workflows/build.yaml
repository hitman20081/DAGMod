name: Build and Package Mod
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Upload Mod Jar to Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          JAR_PATH=$(ls build/libs/*.jar | grep -vE "sources|dev|api" | head -n 1)
          VERSION=${GITHUB_REF#refs/tags/}
          RELEASE_ID=$(curl -s "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/tags/$VERSION" \
            -H "Authorization: token ${{ secrets.WIKI_TOKEN }}" | jq '.id')
          
          curl -X 'POST' \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/$RELEASE_ID/assets" \
            -H "Authorization: token ${{ secrets.WIKI_TOKEN }}" \
            -H "Content-Type: application/java-archive" \
            -F "attachment=@$JAR_PATH"

  sync-wiki:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Docs to Wiki
        run: |
          git config --global user.email "runner@truenas.local"
          git config --global user.name "Wiki Sync Bot"
          rm -rf wiki_repo
          
          git clone -c http.extraheader="Authorization: token ${{ secrets.WIKI_TOKEN }}" \
            "${{ github.server_url }}/${{ github.repository }}.wiki.git" wiki_repo

          if [ -d "docs" ]; then
            rm -rf wiki_repo/*.md
            cp docs/*.md wiki_repo/
          fi

          cd wiki_repo
          git add .
          if git diff --staged --quiet; then
            echo "No changes to wiki."
          else
            git commit -m "Flat Wiki Sync: ${{ github.sha }}"
            # CHANGED FROM MASTER TO MAIN BELOW
            git -c http.extraheader="Authorization: token ${{ secrets.WIKI_TOKEN }}" push origin main
          fi