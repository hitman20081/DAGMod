name: Build and Package Mod
on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine Version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release Zip
        run: |
          mkdir -p build
          zip -r build/DAGMod-${{ steps.get_version.outputs.VERSION }}.zip . -x ".gitea/*" ".git/*"

      # This attaches the zip file directly to your Gitea Release page
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: https://gitea.com/actions/release-action@v1
        with:
          files: build/DAGMod-*.zip
          token: ${{ secrets.GITHUB_TOKEN }}