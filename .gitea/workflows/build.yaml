name: Build and Package Mod
on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release Zip
        run: |
          # Use the commit hash if no tag exists
          VERSION=${GITHUB_REF#refs/tags/}
          if [[ "$VERSION" == refs/heads/* ]]; then VERSION="dev-${GITHUB_SHA::7}"; fi
          mkdir -p build
          zip -r "build/DAGMod-$VERSION.zip" . -x ".gitea/*" ".git/*"
          echo "FINAL_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create Release via API
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          curl -X 'POST' \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases" \
            -H "accept: application/json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${{ env.FINAL_VERSION }}\",
              \"target_commitish\": \"master\",
              \"name\": \"Release ${{ env.FINAL_VERSION }}\",
              \"body\": \"Automated release for ${{ env.FINAL_VERSION }}\",
              \"draft\": false,
              \"prerelease\": false
            }"